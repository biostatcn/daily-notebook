name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://iqpbazjzuomjobvukbuh.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_QIzkGEmRaOHgkcfd7XoppQ_g_xKzQq4
      - run: touch out/.nojekyll
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
